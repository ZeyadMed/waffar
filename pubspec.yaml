name: waffar
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.7+1
  flutter_screenutil: ^5.9.3
  flutter_bloc: ^9.1.1
  expandable: ^5.0.1
  local_auth: ^2.3.0
  dio: ^5.8.0+1
  dio_cache_interceptor: ^4.0.3
  encrypt: ^5.0.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  skeletonizer: ^2.0.1
  hive: ^2.2.3
  flutter_svg: ^2.2.1
  get_it: ^9.2.1
  equatable: ^2.0.8
  flutter_secure_storage: ^10.3.1
  logger: ^2.7.0
  image_picker: ^1.1.2
  camera: ^0.11.1
  google_mlkit_face_detection: ^0.11.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  latlong2: ^0.10.1
  connectivity_plus: ^7.1.1
  internet_connection_checker_plus: ^3.0.1
  flutter_native_splash: ^2.4.3
  gap: ^3.0.1
  go_router: ^15.1.2
  intl_phone_field: ^3.2.0
  pretty_dio_logger: ^1.4.0
  loading_animation_widget: ^1.3.0
  pinput: ^6.0.2
  shimmer: ^3.0.0
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  fonts:
  - family: IBM Plex Sans Arabic
    fonts:
      - asset: assets/fonts/IBMPlexSansArabic-Thin.ttf
        weight: 100
      - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
        weight: 300
      - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        weight: 400
      - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
        weight: 500
      - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
        weight: 600

  assets:
    - assets/
    - assets/icons/
    - assets/fonts/
    - assets/images/
    - assets/translations/

flutter_assets:
  assets_path: assets/
  output_path: lib/core/style/
  filename: assets.dart